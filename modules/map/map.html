<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mapa — GAIA</title>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="./map.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
</head>
<body>
  <a href="#map" class="skip-link">Pular para o mapa</a>

  <main class="gaia-map-app" role="main">
    <header class="gaia-map-header" role="banner">
      <a href="../../index.html" class="gaia-map-header__brand">
        <span class="gaia-map-header__brand-mark" aria-hidden="true">G</span>
        <div>
          <div id="app-name">GAIA</div>
          <div id="app-tagline" style="font-size: 11px; color: var(--gaia-ink-500); font-weight: 400; font-family: var(--gaia-font-sans);"></div>
        </div>
        <span class="gaia-map-header__pill">MVP</span>
      </a>
      <nav aria-label="Navegação principal">
        <a href="../../index.html" class="gaia-btn gaia-btn--ghost">← Voltar</a>
      </nav>
    </header>

    <aside class="gaia-map-sidebar" aria-label="Camadas e busca">
      <section class="gaia-map-sidebar__section">
        <h2 class="gaia-map-sidebar__title">Buscar</h2>
        <div class="gaia-search">
          <label for="search-input" class="sr-only">Buscar município</label>
          <input type="search" id="search-input" placeholder="Buscar município..." autocomplete="off" />
        </div>
      </section>

      <section class="gaia-map-sidebar__section" style="flex: 1;">
        <h2 class="gaia-map-sidebar__title">Camadas</h2>
        <ul class="gaia-layer-list" id="layer-list" role="list"></ul>
      </section>

      <section class="gaia-map-sidebar__callout">
        <p>Camadas <strong>agregadas</strong> têm geometria reduzida. Restritas dependem de verificação de custódia.</p>
        <a href="../../policies/dados-sensiveis.md" target="_blank" rel="noopener">Ler a política →</a>
      </section>
    </aside>

    <div class="gaia-map-canvas">
      <div id="map" role="application" aria-label="Mapa interativo do GAIA"></div>

      <!-- Basemap toggle (canto superior esquerdo) -->
      <div class="gaia-basemap-toggle" id="basemap-toggle"></div>

      <!-- Pin toggle (canto inferior esquerdo) -->
      <div class="gaia-pin-toggle-wrap" id="pin-toggle"></div>

      <aside class="gaia-feature-panel" id="feature-panel" aria-live="polite">
        <header class="gaia-feature-panel__header">
          <div class="gaia-feature-panel__title-block">
            <div class="gaia-feature-panel__category" id="feature-panel-title"></div>
            <div class="gaia-feature-panel__name" id="feature-panel-name"></div>
          </div>
          <button class="gaia-feature-panel__close" id="feature-panel-close" aria-label="Fechar painel">×</button>
        </header>
        <div class="gaia-feature-panel__body" id="feature-panel-body"></div>
      </aside>
    </div>
  </main>
  <script type="module" src="./map.js"></script>
</body>
</html>
